name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NDK_VERSION: r26b
  CMAKE_VERSION: 3.22.1

jobs:
  cpp-tests:
    name: C++ Unit Tests (Google Test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-cov

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.AndroidSdk }}/ndk/${{ env.NDK_VERSION }}
          key: ndk-${{ runner.os }}-${{ env.NDK_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;$NDK_VERSION" || \
          yes | $ANDROID_SDK_ROOT/tools/bin/sdkmanager --install "ndk;$NDK_VERSION"

      - name: Configure CMake
        run: |
          mkdir -p android/app/src/test/cpp/build          cd android/app/src/test/cpp/build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-26

      - name: Build C++ Tests
        run: |
          cd android/app/src/test/cpp/build
          cmake --build . -- -j$(nproc)

      - name: Run C++ Tests
        run: |
          cd android/app/src/test/cpp/build
          ctest --output-on-failure || true
          ./test_engine && echo "test_engine: PASSED" || echo "test_engine: FAILED"
          ./test_synthesizer && echo "test_synthesizer: PASSED" || echo "test_synthesizer: FAILED"
          ./test_piston && echo "test_piston: PASSED" || echo "test_piston: FAILED"

  android-tests:
    name: Android Tests (Unit + Instrumented)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Android SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: |
            ~/Android/Sdk            ~/.android
          key: android-sdk-${{ runner.os }}

      - name: Setup Android SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/Android/Sdk/cmdline-tools
          cd ~/Android/Sdk/cmdline-tools
          curl -s -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip

          yes | ~/Android/Sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=~/Android/Sdk \
            "platforms;android-34" "build-tools;34.0.0" "ndk;26b"

      - name: Setup ANDROID_HOME
        run: echo "ANDROID_HOME=~/Android/Sdk" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # ВОТ ЭТОТ БЛОК ДОБАВЛЕН ДЛЯ СОЗДАНИЯ local.properties
      - name: Create local.properties
        run: echo "sdk.dir=/home/runner/Android/Sdk" > android/local.properties

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon -q

      - name: Run Android Unit Tests
        run: |
          cd android
          ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: android/app/build/reports/tests/

      # ВОТ ЭТОТ БЛОК ДОБАВЛЕН ДЛЯ СОХРАНЕНИЯ APK
      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-sim-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
